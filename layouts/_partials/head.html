{{$favicon_ico := resources.Get "favicon.ico"}}
{{$favicon_svg := resources.Get "favicon.svg"}}
{{$favicon_apple := resources.Get "apple-touch-icon.png"}}

<head>
  <meta property="og:image" content="{{$favicon_apple.RelPermalink}}">
  {{partial "opengraph.html" .}}
  <meta charset="utf-8"/>
  <meta name="theme-color" content="#500060"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  {{$raw_css := resources.Get "css.css"}}
  {{$css := $raw_css | resources.Minify}}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" media="all">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap">
  <link rel="icon" href="{{$favicon_ico.RelPermalink}}" sizes="32x32"/>
  <link rel="icon" href="{{$favicon_svg.RelPermalink}}" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="{{$favicon_apple.RelPermalink}}"/>
  <title>
    {{.Site.Title}}
  </title>
  <meta name="description" content="{{.Summary}}"/>
</head>
